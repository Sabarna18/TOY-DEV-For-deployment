name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  ###############################################################
  # Build & Publish
  ###############################################################

  publish:
    name: Build and Publish Images

    runs-on: ubuntu-latest

    timeout-minutes: 30

    outputs:
      backend-image: ${{ steps.backend_meta.outputs.tags }}
      web-image: ${{ steps.web_meta.outputs.tags }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #########################################################

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #########################################################

      - name: Extract Backend Metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/toy-dev-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      #########################################################

      - name: Extract Web Metadata
        id: web_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/toy-dev-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      #########################################################
      # Backend
      #########################################################

      - name: Publish Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile

          push: true

          provenance: true
          sbom: true

          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      #########################################################
      # Web
      #########################################################

      - name: Publish Web Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/Dockerfile

          push: true

          provenance: true
          sbom: true

          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  ###############################################################
  # GitHub Release
  ###############################################################

  github-release:
    name: Publish GitHub Release

    runs-on: ubuntu-latest

    needs: publish

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

          draft: false

          prerelease: false

          files: |
            README.md
            compose.yaml

      - name: Release Summary
        run: |

          echo "# Release Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Published Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "${{ needs.publish.outputs.backend-image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.publish.outputs.web-image }}" >> $GITHUB_STEP_SUMMARY
