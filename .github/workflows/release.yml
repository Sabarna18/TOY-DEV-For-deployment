name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:

  ###############################################################
  # Publish Docker Images
  ###############################################################

  publish:

    name: Publish Docker Images

    runs-on: ubuntu-latest

    timeout-minutes: 40

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    outputs:
      backend-image: ${{ steps.backend_meta.outputs.tags }}
      web-image: ${{ steps.web_meta.outputs.tags }}
      version: ${{ github.ref_name }}

    steps:

      #########################################################
      # Checkout
      #########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################
      # Buildx
      #########################################################

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #########################################################
      # Login
      #########################################################

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #########################################################
      # Backend Metadata
      #########################################################

      - name: Backend Metadata
        id: backend_meta
        uses: docker/metadata-action@v6

        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/toy-dev-backend

          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

          labels: |
            org.opencontainers.image.title=Toy Dev Backend
            org.opencontainers.image.description=Toy Dev Backend API
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      #########################################################
      # Web Metadata
      #########################################################

      - name: Web Metadata
        id: web_meta
        uses: docker/metadata-action@v6

        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/toy-dev-web

          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

          labels: |
            org.opencontainers.image.title=Toy Dev Web
            org.opencontainers.image.description=Toy Dev Frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      #########################################################
      # Publish Backend
      #########################################################

      - name: Publish Backend Image
        uses: docker/build-push-action@v6

        with:
          context: ./backend
          file: ./backend/Dockerfile

          push: true

          platforms: linux/amd64

          provenance: true
          sbom: true

          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      #########################################################
      # Publish Web
      #########################################################

      - name: Publish Web Image
        uses: docker/build-push-action@v6

        with:
          context: .
          file: ./nginx/Dockerfile

          push: true

          platforms: linux/amd64

          provenance: true
          sbom: true

          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}

          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      #########################################################
      # Summary
      #########################################################

      - name: Publish Summary

        shell: bash

        run: |

          set -euo pipefail

          {
            echo "# Docker Images Published"
            echo ""
            echo "## Backend"
            echo "${{ steps.backend_meta.outputs.tags }}"
            echo ""
            echo "## Web"
            echo "${{ steps.web_meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"


      #########################################################
      # Generate Deployment Manifest
      #########################################################

      - name: Generate Deployment Manifest

        run: |

          cat > deployment.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "backend": "ghcr.io/${{ github.repository_owner }}/toy-dev-backend:${{ github.ref_name }}",
            "web": "ghcr.io/${{ github.repository_owner }}/toy-dev-web:${{ github.ref_name }}"
          }
          EOF

  ###############################################################
  # GitHub Release
  ###############################################################

  github-release:

    name: GitHub Release

    runs-on: ubuntu-latest

    needs: publish

    permissions:
      contents: write

    steps:

      - name: Create GitHub Release

        uses: softprops/action-gh-release@v2

        with:
          generate_release_notes: true

          draft: false

          prerelease: false

          files: |
            README.md
            compose.production.yaml
            deployment.json

      - name: Release Summary

        shell: bash

        run: |

          set -euo pipefail

          {
            echo "# Release Completed"
            echo ""
            echo "## Backend Image"
            echo "${{ needs.publish.outputs.backend-image }}"
            echo ""
            echo "## Web Image"
            echo "${{ needs.publish.outputs.web-image }}"
            echo ""
            echo "Release Tag: ${{ github.ref_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

