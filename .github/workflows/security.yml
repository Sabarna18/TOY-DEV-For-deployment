name: Security

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  schedule:
    - cron: "0 3 * * 1"

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

###############################################################
# Python Audit
###############################################################

jobs:
  python:
    name: Python Dependency Audit

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit Python Dependencies
        working-directory: backend
        run: |

          pip install uv

          uv export --format requirements-txt > requirements.txt

          pip-audit -r requirements.txt

  ###############################################################
  # Node Audit
  ###############################################################

  node:
    name: Node Dependency Audit

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

          cache: npm

          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit Dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

  ###############################################################
  # Trivy Container Scan
  ###############################################################

  containers:
    name: Container Security Scan

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      #########################################################

      - name: Build Backend Image

        uses: docker/build-push-action@v6

        with:
          context: ./backend

          file: ./backend/Dockerfile

          tags: backend-security:latest

          load: true

      #########################################################

      - name: Scan Backend

        uses: aquasecurity/trivy-action@0.28.0

        with:
          image-ref: backend-security:latest

          format: table

          severity: HIGH,CRITICAL

          ignore-unfixed: true

          exit-code: "1"

      #########################################################

      - name: Build Web Image

        uses: docker/build-push-action@v6

        with:
          context: .

          file: ./nginx/Dockerfile

          tags: web-security:latest

          load: true

      #########################################################

      - name: Scan Web

        uses: aquasecurity/trivy-action@0.28.0

        with:
          image-ref: web-security:latest

          format: table

          severity: HIGH,CRITICAL

          ignore-unfixed: true

          exit-code: "1"

  ###############################################################
  # CodeQL
  ###############################################################

  codeql:
    name: CodeQL Analysis

    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      matrix:
        language:
          - python
          - javascript

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3

  ###############################################################
  # Summary
  ###############################################################

  summary:
    name: Security Summary

    runs-on: ubuntu-latest

    needs:
      - python
      - node
      - containers
      - codeql

    steps:
      - name: Generate Summary
        run: |

          echo "# Security Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Node Audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ✅ |" >> $GITHUB_STEP_SUMMARY
