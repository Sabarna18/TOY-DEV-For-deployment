name: Deploy

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Production

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      #########################################################
      # Install Railway CLI
      #########################################################

      - name: Install Railway CLI

        run: |

          npm install -g @railway/cli

      #########################################################
      # Authenticate
      #########################################################

      - name: Authenticate Railway

        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

        run: |

          railway whoami

      #########################################################
      # Redeploy Backend
      #########################################################

      - name: Redeploy Backend

        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

        run: |

          railway redeploy \
            --service "${{ secrets.RAILWAY_BACKEND_SERVICE }}" \
            --yes

      #########################################################
      # Redeploy Frontend
      #########################################################

      - name: Redeploy Frontend

        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

        run: |

          railway redeploy \
            --service "${{ secrets.RAILWAY_FRONTEND_SERVICE }}" \
            --yes

      #########################################################
      # Wait for rollout
      #########################################################

      - name: Wait for Deployment

        run: |

          echo "Waiting for Railway deployment..."

          sleep 45

      #########################################################
      # Backend Health Check
      #########################################################

      - name: Backend Health Check

        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

        run: |

          curl \
            --fail \
            --retry 15 \
            --retry-delay 5 \
            --retry-all-errors \
            "$BACKEND_URL/api/v1/health"

      #########################################################
      # Deployment Summary
      #########################################################

      - name: Deployment Summary

        run: |

          {
            echo "# 🚀 Production Deployment"
            echo ""
            echo "| Component | Status |"
            echo "|-----------|--------|"
            echo "| Backend | ✅ |"
            echo "| Frontend | ✅ |"
            echo "| Health Check | ✅ |"
            echo ""
            echo "Backend URL:"
            echo "${{ secrets.BACKEND_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
