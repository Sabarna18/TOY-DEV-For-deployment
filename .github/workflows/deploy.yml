name: Deploy

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Production

    # Automatic deployment only after a successful Release workflow.
    # Manual workflow_dispatch is also allowed.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    timeout-minutes: 20

    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      RAILWAY_BACKEND_SERVICE: ${{ secrets.RAILWAY_SERVICE_ID_BACKEND }}
      RAILWAY_FRONTEND_SERVICE: ${{ secrets.RAILWAY_SERVICE_ID_FRONTEND }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:

      #########################################################
      # Validate Configuration
      #########################################################

      - name: Validate Deployment Configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "::error::RAILWAY_TOKEN is not configured."
            exit 1
          fi

          if [ -z "${RAILWAY_BACKEND_SERVICE}" ]; then
            echo "::error::RAILWAY_BACKEND_SERVICE is not configured."
            exit 1
          fi

          if [ -z "${RAILWAY_FRONTEND_SERVICE}" ]; then
            echo "::error::RAILWAY_FRONTEND_SERVICE is not configured."
            exit 1
          fi

          if [ -z "${BACKEND_URL}" ]; then
            echo "::error::BACKEND_URL is not configured."
            exit 1
          fi

          echo "Deployment configuration validated."

      #########################################################
      # Install Railway CLI
      #########################################################

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli

      #########################################################
      # Railway CLI Version
      #########################################################

      - name: Verify Railway CLI
        run: |
          railway --version

      #########################################################
      # Redeploy Backend
      #########################################################

      - name: Redeploy Backend
        shell: bash
        run: |
          set -euo pipefail

          echo "Triggering backend redeployment..."

          railway redeploy \
            --service "${RAILWAY_BACKEND_SERVICE}" \
            --yes

          echo "Backend redeployment triggered."

      #########################################################
      # Redeploy Frontend
      #########################################################

      - name: Redeploy Frontend
        shell: bash
        run: |
          set -euo pipefail

          echo "Triggering frontend redeployment..."

          railway redeploy \
            --service "${RAILWAY_FRONTEND_SERVICE}" \
            --yes

          echo "Frontend redeployment triggered."

      #########################################################
      # Backend Health Check
      #########################################################

      - name: Backend Health Check
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for backend deployment to become healthy..."

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 15 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 10 \
            "${BACKEND_URL%/}/api/v1/health"

          echo ""
          echo "Backend health check passed."

      #########################################################
      # Deployment Summary
      #########################################################

      - name: Deployment Summary
        if: success()
        shell: bash
        run: |
          {
            echo "# 🚀 Production Deployment"
            echo ""
            echo "| Component | Status |"
            echo "|-----------|--------|"
            echo "| Backend redeploy | ✅ Triggered |"
            echo "| Frontend redeploy | ✅ Triggered |"
            echo "| Backend health check | ✅ Passed |"
            echo ""
            echo "## Backend"
            echo "${BACKEND_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      #########################################################
      # Failure Summary
      #########################################################

      - name: Deployment Failure Summary
        if: failure()
        shell: bash
        run: |
          {
            echo "# ❌ Production Deployment Failed"
            echo ""
            echo "One or more deployment steps failed."
            echo ""
            echo "Check the failed GitHub Actions step and Railway deployment logs."
          } >> "$GITHUB_STEP_SUMMARY"