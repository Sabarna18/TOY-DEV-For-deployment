name: Docker Verification

on:
  workflow_call:

permissions:
  contents: read

jobs:
  docker:
    name: Docker Compose Validation

    runs-on: ubuntu-latest

    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      #########################################################
      # Checkout
      #########################################################

      - name: Checkout Repository
        uses: actions/checkout@v7

      #########################################################
      # Buildx
      #########################################################

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #########################################################
      # Build Backend Image (Validation Only)
      #########################################################

      - name: Build Backend Image

        uses: docker/build-push-action@v6

        with:
          context: ./backend
          file: ./backend/Dockerfile

          push: false

          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      #########################################################
      # Build Web Image (Validation Only)
      #########################################################

      - name: Build Web Image

        uses: docker/build-push-action@v6

        with:
          context: .
          file: ./nginx/Dockerfile

          push: false

          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web



      #########################################################
      # Build Web Image (Validation Only)
      #########################################################
        
      - name: Generate backend .env

        run: |
          cat > backend/.env <<EOF
          APP_NAME=Toy Deployment App
          ENVIRONMENT=development
          DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/toydb
          API_HOST=127.0.0.1
          API_PORT=8000
          LOG_LEVEL=INFO
          CORS_ORIGINS=http://localhost:3002
          EOF

      #########################################################
      # Compose Validation
      #########################################################

      - name: Validate Docker Environment

        run: |
          chmod +x scripts/docker.sh
          ./scripts/docker.sh

      #########################################################
      # Summary
      #########################################################

      - name: Docker Summary

        run: |

          echo "# Docker Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Image | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Image | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Compose Validation | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
