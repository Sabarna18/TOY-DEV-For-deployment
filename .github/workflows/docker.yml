name: Docker Pipeline

on:
  workflow_call:

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io

  BACKEND_IMAGE: toy-dev-backend
  WEB_IMAGE: toy-dev-web

jobs:
  docker:
    name: Build & Publish Docker Images

    runs-on: ubuntu-latest

    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      #########################################################
      # Checkout
      #########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################
      # Buildx
      #########################################################

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #########################################################
      # Login (main only)
      #########################################################

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      #########################################################
      # Backend Metadata
      #########################################################

      - name: Backend Image Metadata
        id: backend_meta

        uses: docker/metadata-action@v5

        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE }}

          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

          labels: |
            org.opencontainers.image.title=Toy Dev Backend
            org.opencontainers.image.description=Toy Deployment Backend API
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      #########################################################
      # Web Metadata
      #########################################################

      - name: Web Image Metadata
        id: web_meta

        uses: docker/metadata-action@v5

        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WEB_IMAGE }}

          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

          labels: |
            org.opencontainers.image.title=Toy Dev Web
            org.opencontainers.image.description=Toy Deployment Web Application
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      #########################################################
      # Backend Image
      #########################################################

      - name: Build Backend Image

        uses: docker/build-push-action@v6

        with:
          context: ./backend

          file: ./backend/Dockerfile

          push: ${{ github.ref == 'refs/heads/main' }}

          tags: ${{ steps.backend_meta.outputs.tags }}

          labels: ${{ steps.backend_meta.outputs.labels }}

          cache-from: type=gha,scope=backend

          cache-to: type=gha,mode=max,scope=backend

          provenance: true

          sbom: true

      #########################################################
      # Web Image
      #########################################################

      - name: Build Web Image

        uses: docker/build-push-action@v6

        with:
          context: .

          file: ./nginx/Dockerfile

          push: ${{ github.ref == 'refs/heads/main' }}

          tags: ${{ steps.web_meta.outputs.tags }}

          labels: ${{ steps.web_meta.outputs.labels }}

          cache-from: type=gha,scope=web

          cache-to: type=gha,mode=max,scope=web

          provenance: true

          sbom: true

      #########################################################
      # Docker Validation
      #########################################################

      - name: Validate Docker Environment

        run: |

          chmod +x scripts/docker.sh

          ./scripts/docker.sh

      #########################################################
      # Build Summary
      #########################################################

      - name: Docker Summary

        run: |

          echo "## Docker Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Image | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Web Image | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Validation | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Published Images" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.BACKEND_IMAGE }}" >> $GITHUB_STEP_SUMMARY
            echo "- ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.WEB_IMAGE }}" >> $GITHUB_STEP_SUMMARY
          fi
