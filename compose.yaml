services:
  postgres:
    image: postgres:17
    container_name: toy-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toydb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d toydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: toy-backend

    env_file:
      - backend/.env

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/toydb

    expose:
      - "8003"

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: toy-frontend

    expose:
      - "80"

    restart: unless-stopped

  nginx:
    build:
      context: ./nginx

    container_name: toy-nginx

    ports:
      - "80:80"

    depends_on:
      - backend
      - frontend

    restart: unless-stopped

volumes:
  postgres_data:
