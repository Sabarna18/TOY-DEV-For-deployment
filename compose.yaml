services:
  postgres:
    image: postgres:17

    container_name: toy-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toydb

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d toydb"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - toy-network

  backend:
    build:
      context: ./backend

    container_name: toy-backend

    env_file:
      - backend/.env

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/toydb

    expose:
      - "8003"

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/v1/health')",
        ]

      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - toy-network

  web:
    build:
      context: .

      dockerfile: nginx/Dockerfile

    container_name: toy-web

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost"]

      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - toy-network

volumes:
  postgres_data:

networks:
  toy-network:
