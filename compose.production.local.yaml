services:
  #########################################################
  # PostgreSQL
  #########################################################

  postgres:
    image: postgres:17
    
    container_name: toy-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - toy-network

  #########################################################
  # Backend
  #########################################################

  backend:
    image: ${BACKEND_IMAGE}

    container_name: toy-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "8003"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/v1/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


    networks:
      - toy-network

  #########################################################
  # Web
  #########################################################

  web:
    image: ${WEB_IMAGE}

    container_name: toy-web

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]

      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - toy-network

#########################################################

volumes:
  postgres_data:

#########################################################

networks:
  toy-network:
    driver: bridge
